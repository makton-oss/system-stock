<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inbox — StokBot Admin</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#1D9E75">

<!-- ============================================================
     AUTH GUARD — jalan sebelum apa-apa render, elak "flash" UI
     untuk orang yang takde token sah dalam cookie.
============================================================ -->
<script>
  (function () {
    function getCookie(name) {
      var m = document.cookie.match(new RegExp('(?:^|; )' + name + '=([^;]*)'));
      return m ? decodeURIComponent(m[1]) : null;
    }
    if (!getCookie('stokbot_admin_token')) {
      window.location.replace('/admin/login.html');
      return;
    }
    // THEME — apply early (sebelum paint) supaya tak ada flash light→dark
    var theme = getCookie('stokbot_admin_theme');
    document.documentElement.setAttribute('data-theme', theme === 'dark' ? 'dark' : 'light');
  })();
</script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Sora:wght@700;800&display=swap" rel="stylesheet">

<style>
  :root{
    --green:#1D9E75; --green-light:#E1F5EE; --green-dark:#0F6E56;
    --amber:#EF9F27; --amber-light:#FAEEDA;
    --text:#1a1a1a; --text-muted:#6b7280; --text-xmuted:#9ca3af;
    --border:#e5e7eb; --section-bg:#f9fafb;
    --role-staff-bg:#EAF3DE;  --role-staff-text:#3B6D11;
    --role-sv-bg:#FAEEDA;     --role-sv-text:#854F0B;
    --role-mgr-bg:#E1F5EE;    --role-mgr-text:#0F6E56;
    --role-admin-bg:#E6F1FB;  --role-admin-text:#185FA5;
    --role-owner-bg:#F5F3FF;  --role-owner-text:#5B21B6;
    --wallpaper:#F3F8F6;
    /* surfaces — guna var ni utk apa-apa yg sebelum ni hardcode #fff */
    --bg:#ffffff;
    --bubble-in-bg:#ffffff;
    --shadow-color:rgba(0,0,0,0.06);
    --shadow-color-strong:rgba(0,0,0,0.18);
    --scrollbar-thumb:rgba(0,0,0,0.12);
  }

  /* ===================== DARK MODE ===================== */
  [data-theme="dark"]{
    --green-light:#16382c; --amber-light:#3a2a12;
    --text:#e6e8eb; --text-muted:#9aa3af; --text-xmuted:#6b7280;
    --border:#2d3340; --section-bg:#1c212b;
    --role-staff-bg:#1c2e16;  --role-staff-text:#9ad86b;
    --role-sv-bg:#3a2a12;     --role-sv-text:#f3b35c;
    --role-mgr-bg:#16382c;    --role-mgr-text:#5DCAA5;
    --role-admin-bg:#13283d;  --role-admin-text:#6cb4f0;
    --role-owner-bg:#241b3d;  --role-owner-text:#b09af0;
    --wallpaper:#0d1117;
    --bg:#161b22;
    --bubble-in-bg:#222933;
    --shadow-color:rgba(0,0,0,0.35);
    --shadow-color-strong:rgba(0,0,0,0.55);
    --scrollbar-thumb:rgba(255,255,255,0.14);
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;}
  body{
    font-family:'Plus Jakarta Sans',sans-serif;
    color:var(--text);
    background:var(--bg);
    overflow:hidden;
    transition:background-color .15s, color .15s;
  }

  .app{ display:flex; height:100vh; }

  /* ===================== SIDEBAR ===================== */
  .sidebar{
    width:340px; flex-shrink:0;
    display:flex; flex-direction:column;
    background:var(--bg); border-right:1px solid var(--border);
  }
  .sidebar__header{
    padding:14px 16px; display:flex; align-items:center; gap:10px;
    border-bottom:1px solid var(--border); flex-shrink:0;
  }
  .sidebar__brand{ display:flex; align-items:center; gap:10px; flex:1; min-width:0; }
  .sidebar__brand-icon{
    width:36px;height:36px;border-radius:10px;background:var(--green);color:#fff;
    display:flex;align-items:center;justify-content:center;
    font-family:'Sora',sans-serif;font-weight:800;font-size:1rem;flex-shrink:0;
  }
  .sidebar__brand-text strong{ display:block; font-family:'Sora',sans-serif; font-size:0.92rem; font-weight:800; }
  .sidebar__brand-text small{ display:block; font-size:0.72rem; color:var(--text-muted); }
  .sidebar__actions{ display:flex; gap:4px; flex-shrink:0; }
  .icon-btn{
    width:34px;height:34px;border-radius:50%;border:none;background:none;
    display:flex;align-items:center;justify-content:center;
    color:var(--text-muted);cursor:pointer;text-decoration:none;
    transition:background .15s,color .15s;
  }
  .icon-btn:hover{ background:var(--section-bg); color:var(--green-dark); }
  .icon-btn svg{ width:18px;height:18px; }

  /* theme toggle icon swap */
  #themeToggleBtn .icon-moon{ display:none; }
  [data-theme="dark"] #themeToggleBtn .icon-sun{ display:none; }
  [data-theme="dark"] #themeToggleBtn .icon-moon{ display:block; }

  #pushBtn.active{ color:var(--green); }

  .sidebar__search{ padding:10px 14px; flex-shrink:0; }
  .search-box{
    display:flex; align-items:center; gap:8px;
    background:var(--section-bg); border-radius:20px; padding:8px 14px;
  }
  .search-box svg{ width:15px;height:15px;color:var(--text-muted);flex-shrink:0; }
  .search-box input{
    border:none;background:transparent;outline:none;width:100%;
    font-size:0.84rem;font-family:inherit;color:var(--text);
  }

  .sidebar__list{ flex:1; overflow-y:auto; }
  .sidebar__empty{ padding:48px 24px; text-align:center; color:var(--text-muted); font-size:0.85rem; line-height:1.5; }

  .convo{
    display:flex; gap:12px; align-items:flex-start;
    padding:12px 16px; border-bottom:1px solid #f3f4f6; cursor:pointer;
    transition:background .12s;
  }
  .convo:hover{ background:var(--section-bg); }
  .convo.active{ background:var(--green-light); }
  .convo__avatar{
    width:44px;height:44px;border-radius:50%;flex-shrink:0;
    background:var(--green-light); color:var(--green-dark);
    display:flex;align-items:center;justify-content:center;
    font-family:'Sora',sans-serif; font-weight:700; font-size:0.85rem;
  }
  .convo__body{ flex:1; min-width:0; }
  .convo__top{ display:flex; justify-content:space-between; align-items:baseline; gap:8px; }
  .convo__name{ font-weight:700; font-size:0.88rem; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .convo__time{ font-size:0.68rem; color:var(--text-xmuted); flex-shrink:0; }
  .convo__bottom{ display:flex; justify-content:space-between; align-items:center; gap:8px; margin-top:3px; }
  .convo__preview{ font-size:0.78rem; color:var(--text-muted); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; flex:1; }
  .convo__badge{ width:9px;height:9px;border-radius:50%;background:var(--green);flex-shrink:0; }

  /* ===================== CHAT PANE ===================== */
  .chatpane{ flex:1; display:flex; flex-direction:column; min-width:0; background:var(--wallpaper); }

  .chatpane__back{
    display:none; width:32px;height:32px;border-radius:50%;border:none;background:none;
    align-items:center;justify-content:center;color:var(--text-muted);cursor:pointer;flex-shrink:0;
  }
  .chatpane__back svg{ width:18px;height:18px; }

  .chatpane__header{
    display:none; align-items:center; gap:12px;
    padding:11px 20px; background:var(--bg); border-bottom:1px solid var(--border); flex-shrink:0;
  }
  .chatpane__avatar{
    width:40px;height:40px;border-radius:50%;flex-shrink:0;
    background:var(--green-light); color:var(--green-dark);
    display:flex;align-items:center;justify-content:center;
    font-family:'Sora',sans-serif; font-weight:700; font-size:0.85rem;
  }
  .chatpane__avatar.avatar--staff{ background:var(--role-staff-bg); color:var(--role-staff-text); }
  .chatpane__avatar.avatar--sv{ background:var(--role-sv-bg); color:var(--role-sv-text); }
  .chatpane__avatar.avatar--manager{ background:var(--role-mgr-bg); color:var(--role-mgr-text); }
  .chatpane__avatar.avatar--admin{ background:var(--role-admin-bg); color:var(--role-admin-text); }
  .chatpane__avatar.avatar--owner{ background:var(--role-owner-bg); color:var(--role-owner-text); }
  .chatpane__info{ min-width:0; }
  .chatpane__name{ font-weight:700; font-size:0.92rem; }
  .chatpane__meta{ font-size:0.74rem; color:var(--text-muted); margin-top:1px; }

  .chatpane__empty{
    flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:10px; color:var(--text-muted); text-align:center; padding:0 20px;
  }
  .chatpane__empty svg{ width:56px;height:56px;color:var(--text-xmuted); }
  .chatpane__empty p{ font-size:0.88rem; max-width:280px; line-height:1.5; }

  .chatpane__messages{ display:none; flex:1; overflow-y:auto; padding:20px 24px; position:relative; }
  .chatpane__messages::-webkit-scrollbar{ width:6px; }
  .chatpane__messages::-webkit-scrollbar-thumb{ background:var(--scrollbar-thumb); border-radius:6px; }

  .msg-row{ display:flex; margin-bottom:8px; }
  .msg-row--in{ justify-content:flex-start; }
  .msg-row--out{ justify-content:flex-end; }

  .bubble{
    max-width:62%; padding:8px 12px; border-radius:10px; font-size:0.86rem;
    line-height:1.5; word-break:break-word; box-shadow:0 1px 2px var(--shadow-color);
  }
  .bubble--in{ background:var(--bubble-in-bg); border-radius:2px 10px 10px 10px; }
  .bubble--out{ background:var(--green-light); border-radius:10px 2px 10px 10px; }
  .bubble--manual{ border-left:3px solid var(--green); }
  .bubble__text{ white-space:pre-wrap; }
  .bubble__time{ font-size:0.65rem; color:var(--text-xmuted); margin-top:4px; text-align:right; }

  .scroll-latest-btn{
    position:absolute; left:50%; bottom:16px; transform:translateX(-50%);
    background:var(--green); color:#fff; border:none; border-radius:20px;
    padding:7px 16px; font-size:0.76rem; font-weight:700; cursor:pointer;
    box-shadow:0 4px 14px var(--shadow-color-strong); display:none; font-family:inherit;
  }
  .scroll-latest-btn:hover{ background:var(--green-dark); }

  .composer{
    display:none; gap:10px; align-items:flex-end;
    padding:12px 18px; background:var(--bg); border-top:1px solid var(--border); flex-shrink:0;
  }
  .composer textarea{
    flex:1; resize:none; max-height:120px; min-height:42px;
    padding:10px 16px; border:1px solid var(--border); border-radius:20px;
    font-family:inherit; font-size:0.88rem; outline:none; line-height:1.4;
    background:var(--bg); color:var(--text);
    transition:border-color .15s, background-color .15s, color .15s;
  }
  .composer textarea:focus{ border-color:var(--green); }
  .composer__send{
    width:42px;height:42px;border-radius:50%;border:none;background:var(--green);
    color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;
    flex-shrink:0;transition:background .15s;
  }
  .composer__send:hover{ background:var(--green-dark); }
  .composer__send svg{ width:18px;height:18px; }

  /* ===================== RESPONSIVE ===================== */
  @media (max-width:760px){
    .sidebar{ width:100%; }
    .chatpane__back{ display:flex; }
    .app:not(.chat-open) .chatpane{ display:none; }
    .app.chat-open .sidebar{ display:none; }
    /* elak iOS Safari auto-zoom bila focus input (kena >=16px) */
    .composer textarea, .search-box input{ font-size:16px; }
  }
</style>
</head>
<body>

<div class="app" id="app">

  <!-- ===================== SIDEBAR ===================== -->
  <div class="sidebar">
    <div class="sidebar__header">
      <div class="sidebar__brand">
        <div class="sidebar__brand-icon">S</div>
        <div class="sidebar__brand-text">
          <strong>StokBot</strong>
          <small>Admin Inbox</small>
        </div>
      </div>
      <div class="sidebar__actions">
        <button class="icon-btn" id="pushBtn" title="Enable notification" onclick="enablePush()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
        </button>
        <button class="icon-btn" id="themeToggleBtn" title="Tukar tema" onclick="toggleTheme()">
          <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>
          <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
        <a href="/admin/import.html" class="icon-btn" title="Bulk Import">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>
        </a>
        <button class="icon-btn" title="Log keluar" onclick="logout()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        </button>
      </div>
    </div>

    <div class="sidebar__search">
      <div class="search-box">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="searchInput" placeholder="Cari perbualan...">
      </div>
    </div>

    <div class="sidebar__list" id="sidebar">
      <div class="sidebar__empty">Memuatkan...</div>
    </div>
  </div>

  <!-- ===================== CHAT PANE ===================== -->
  <div class="chatpane">

    <div class="chatpane__header" id="chatHeader">
      <button class="chatpane__back" onclick="backToList()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
      </button>
      <div class="chatpane__avatar" id="chatAvatar">?</div>
      <div class="chatpane__info">
        <div class="chatpane__name" id="chatName"></div>
        <div class="chatpane__meta" id="chatMeta"></div>
      </div>
    </div>

    <div class="chatpane__empty" id="chatEmpty">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
      <p>Pilih perbualan di sebelah kiri untuk mula membaca dan membalas mesej.</p>
    </div>

    <div class="chatpane__messages" id="chatMessages">
      <button class="scroll-latest-btn" id="scrollLatestBtn" onclick="scrollToLatest()">⬇ Mesej terbaru</button>
    </div>

    <div class="composer" id="composer">
      <textarea id="replyText" placeholder="Taip mesej..." rows="1"></textarea>
      <button class="composer__send" onclick="sendReply()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </div>

  </div>

</div>

<script>
  // ======================
  // AUTH (cookie-based)
  // ======================
  const COOKIE_NAME = 'stokbot_admin_token';
  const THEME_COOKIE = 'stokbot_admin_theme';

  function getCookie(name) {
    const m = document.cookie.match(new RegExp('(?:^|; )' + name + '=([^;]*)'));
    return m ? decodeURIComponent(m[1]) : null;
  }
  function clearCookie(name) {
    document.cookie = `${name}=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;`;
  }

  // ======================
  // THEME (cookie-based — sama mekanisme dgn token)
  // ======================
  function setThemeCookie(theme) {
    const expires = new Date(Date.now() + 365 * 24 * 60 * 60 * 1000).toUTCString();
    const secure  = location.protocol === 'https:' ? '; Secure' : '';
    document.cookie = `${THEME_COOKIE}=${theme}; expires=${expires}; path=/; SameSite=Lax${secure}`;
  }

  function toggleTheme() {
    const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
    const next = isDark ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    setThemeCookie(next);
  }

  // ======================
  // PUSH NOTIFICATION (PWA)
  // ======================
  // ⚠️ Ganti VAPID_PUBLIC_KEY ni dengan punya hg sendiri kalau generate baru.
  const VAPID_PUBLIC_KEY = 'BMTZ2mxyQsYOWi1JKVxLTCmF3zjwg93InG1qgLZictac4jqD0Z-VOmNRE9jhrKvcNOr1BTZUTBFObGJFWa7waJU';

  function urlBase64ToUint8Array(base64String) {
    const padding = '='.repeat((4 - base64String.length % 4) % 4);
    const base64 = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
    const rawData = atob(base64);
    return Uint8Array.from([...rawData].map(c => c.charCodeAt(0)));
  }

  async function registerServiceWorker() {
    if (!('serviceWorker' in navigator)) return null;
    try {
      return await navigator.serviceWorker.register('/sw.js', { scope: '/admin/' });
    } catch (err) {
      console.log('SW REGISTER ERROR:', err);
      return null;
    }
  }

  async function refreshPushButtonState() {
    const reg = await navigator.serviceWorker?.getRegistration('/admin/');
    const sub = await reg?.pushManager.getSubscription();
    document.getElementById('pushBtn')?.classList.toggle('active', !!sub);
  }

  async function enablePush() {
    if (!('serviceWorker' in navigator) || !('PushManager' in window)) {
      alert('Browser/device ni tak support push notification.');
      return;
    }

    const permission = await Notification.requestPermission();
    if (permission !== 'granted') {
      alert('Notification permission ditolak. Enable manual dalam browser settings kalau nak guna.');
      return;
    }

    const reg = await registerServiceWorker();
    if (!reg) return;

    let sub = await reg.pushManager.getSubscription();
    if (!sub) {
      sub = await reg.pushManager.subscribe({
        userVisibleOnly: true,
        applicationServerKey: urlBase64ToUint8Array(VAPID_PUBLIC_KEY)
      });
    }

    await fetch(`/admin/push/subscribe?token=${encodeURIComponent(getToken())}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(sub.toJSON())
    });

    document.getElementById('pushBtn').classList.add('active');
  }

  // auto-register SW bila page load (subscribe sendiri tetap perlu klik — browser policy)
  registerServiceWorker().then(() => refreshPushButtonState());

  const TOKEN = getCookie(COOKIE_NAME);
  if (!TOKEN) window.location.replace('/admin/login.html');

  function getToken() {
  // Baca dari cookie, bukan input field
  const match = document.cookie.match(/(?:^|; )stokbot_admin_token=([^;]*)/);
  return match ? decodeURIComponent(match[1]) : '';
}

  function logout() {
    clearCookie(COOKIE_NAME);
    window.location.href = '/admin/login.html';
  }

  // Token dah takde sah (revoked / expired) — balik ke login
  function handleAuthError(res) {
    if (res.status === 403) {
      clearCookie(COOKIE_NAME);
      window.location.href = '/admin/login.html';
      return true;
    }
    return false;
  }

  // ======================
  // STATE
  // ======================
  let activeChatId = null;
  let lastConversations = [];
  let searchTerm = '';
  let pollTimer = null;

  // ======================
  // HELPERS
  // ======================
  function getInitials(name) {
    if (!name) return '?';
    const parts = String(name).trim().split(/\s+/).slice(0, 2);
    return parts.map(p => p.charAt(0).toUpperCase()).join('') || '?';
  }

  const ROLE_CLASS = {
    staff: 'avatar--staff',
    supervisor: 'avatar--sv',
    manager: 'avatar--manager',
    admin: 'avatar--admin',
    superadmin: 'avatar--admin',
    owner: 'avatar--owner'
  };

  function isNearBottom(box, threshold = 80) {
    return box.scrollHeight - box.scrollTop - box.clientHeight < threshold;
  }

  function scrollToLatest() {
    const box = document.getElementById('chatMessages');
    box.scrollTop = box.scrollHeight;
    document.getElementById('scrollLatestBtn').style.display = 'none';
  }

  document.getElementById('chatMessages').addEventListener('scroll', function () {
    document.getElementById('scrollLatestBtn').style.display = isNearBottom(this) ? 'none' : 'block';
  });

  function backToList() {
    document.getElementById('app').classList.remove('chat-open');
  }

  // ======================
  // CONVERSATIONS
  // ======================
  function init() {
    fetchConversations();
    pollTimer = setInterval(() => {
      fetchConversations();
      if (activeChatId) loadMessages(activeChatId);
    }, 15000);
  }

  function fetchConversations() {
    fetch(`/admin/conversations?token=${encodeURIComponent(getToken())}&channel=meta`)
      .then(r => {
        if (handleAuthError(r)) return null;
        return r.json();
      })
      .then(data => {
        if (!data) return;
        lastConversations = data;
        renderSidebar();
      })
      .catch(err => console.log('Gagal load conversations:', err));
  }

  function renderSidebar() {
    const sidebar = document.getElementById('sidebar');

    const filtered = !searchTerm
      ? lastConversations
      : lastConversations.filter(c => {
          const name = (c.nickname || c.chat_id || '').toString().toLowerCase();
          return name.includes(searchTerm) || String(c.chat_id).includes(searchTerm);
        });

    if (!filtered.length) {
      sidebar.innerHTML = `<div class="sidebar__empty">${lastConversations.length ? 'Tiada hasil carian' : 'Tiada perbualan dijumpai'}</div>`;
      return;
    }

    sidebar.innerHTML = '';

    filtered.forEach(c => {
      const name = c.nickname || c.chat_id;
      const time = new Date(c.last_at).toLocaleString('ms-MY', { hour: '2-digit', minute: '2-digit' });

      const div = document.createElement('div');
      div.className = 'convo' + (c.chat_id === activeChatId ? ' active' : '');

      const avatar = document.createElement('div');
      avatar.className = 'convo__avatar';
      avatar.textContent = getInitials(name);

      const body = document.createElement('div');
      body.className = 'convo__body';

      const top = document.createElement('div');
      top.className = 'convo__top';

      const nameEl = document.createElement('div');
      nameEl.className = 'convo__name';
      nameEl.textContent = name;

      const timeEl = document.createElement('div');
      timeEl.className = 'convo__time';
      timeEl.textContent = time;

      top.appendChild(nameEl);
      top.appendChild(timeEl);

      const bottom = document.createElement('div');
      bottom.className = 'convo__bottom';

      const previewEl = document.createElement('div');
      previewEl.className = 'convo__preview';
      previewEl.textContent = (c.last_direction === 'out' ? 'Anda: ' : '') + (c.last_message || '');
      bottom.appendChild(previewEl);

      // badge hijau = mesej terakhir dari customer (belum dibalas)
      if (c.last_direction === 'in') {
        const badge = document.createElement('div');
        badge.className = 'convo__badge';
        bottom.appendChild(badge);
      }

      body.appendChild(top);
      body.appendChild(bottom);
      div.appendChild(avatar);
      div.appendChild(body);

      div.onclick = () => openChat(c.chat_id, name);
      sidebar.appendChild(div);
    });
  }

  document.getElementById('searchInput').addEventListener('input', function () {
    searchTerm = this.value.trim().toLowerCase();
    renderSidebar();
  });

  // ======================
  // OPEN CHAT
  // ======================
  function openChat(chatId, name) {
    activeChatId = chatId;

    document.getElementById('app').classList.add('chat-open');

    document.getElementById('chatName').textContent = name;
    document.getElementById('chatMeta').textContent = 'Memuatkan...';
    document.getElementById('chatAvatar').textContent = getInitials(name);
    document.getElementById('chatAvatar').className = 'chatpane__avatar';

    document.getElementById('chatHeader').style.display = 'flex';
    document.getElementById('chatEmpty').style.display = 'none';
    document.getElementById('chatMessages').style.display = 'flex';
    document.getElementById('chatMessages').style.flexDirection = 'column';
    document.getElementById('composer').style.display = 'flex';
    document.getElementById('scrollLatestBtn').style.display = 'none';

    renderSidebar();
    loadUserInfo(chatId);
    loadMessages(chatId, true);
  }

  function loadUserInfo(chatId) {
    fetch(`/admin/user-info?token=${encodeURIComponent(getToken())}&chat_id=${encodeURIComponent(chatId)}`)
      .then(r => {
        if (handleAuthError(r)) return null;
        return r.json();
      })
      .then(info => {
        if (!info) return;
        const metaParts = [];
        if (info.role) metaParts.push(info.role.toUpperCase());
        if (info.outlet_name) metaParts.push(info.outlet_name);
        if (info.tenant_slug) metaParts.push(info.tenant_slug);
        document.getElementById('chatMeta').textContent = metaParts.join(' · ') || '-';
        document.getElementById('chatAvatar').className = 'chatpane__avatar ' + (ROLE_CLASS[info.role] || '');
      })
      .catch(() => {});
  }

  // ======================
  // MESSAGES
  // ======================
  function loadMessages(chatId, forceBottom = false) {
    fetch(`/admin/logs?token=${encodeURIComponent(getToken())}&channel=meta&chat_id=${encodeURIComponent(chatId)}`)
      .then(r => {
        if (handleAuthError(r)) return null;
        return r.json();
      })
      .then(data => {
        if (!data) return;
        renderMessages(data, forceBottom);
      });
  }

  function renderMessages(data, forceBottom = false) {
    const box = document.getElementById('chatMessages');
    const wasNearBottom = forceBottom || isNearBottom(box);
    const prevScrollTop = box.scrollTop;

    // scrollLatestBtn kekal — kosongkan mesej je
    Array.from(box.querySelectorAll('.msg-row')).forEach(el => el.remove());

    [...data].reverse().forEach(row => {
      const wrap = document.createElement('div');
      wrap.className = 'msg-row ' + (row.direction === 'out' ? 'msg-row--out' : 'msg-row--in');

      const bubble = document.createElement('div');
      bubble.className = 'bubble bubble--' + row.direction + (row.msg_type === 'manual' ? ' bubble--manual' : '');

      const text = document.createElement('div');
      text.className = 'bubble__text';
      text.textContent = row.message || '(kosong)';
      bubble.appendChild(text);

      const time = document.createElement('div');
      time.className = 'bubble__time';
      time.textContent = new Date(row.created_at).toLocaleString('ms-MY');
      bubble.appendChild(time);

      wrap.appendChild(bubble);
      box.appendChild(wrap);
    });

    if (wasNearBottom) {
      box.scrollTop = box.scrollHeight;
      document.getElementById('scrollLatestBtn').style.display = 'none';
    } else {
      box.scrollTop = prevScrollTop;
      document.getElementById('scrollLatestBtn').style.display = 'block';
    }
  }

  function sendReply() {
    const text = document.getElementById('replyText').value.trim();

    if (!activeChatId) { alert('Pilih perbualan dulu'); return; }
    if (!text) return;

    fetch(`/admin/send?token=${encodeURIComponent(getToken())}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ chat_id: activeChatId, message: text })
    })
      .then(r => {
        if (handleAuthError(r)) return null;
        return r.json();
      })
      .then(data => {
        if (!data) return;
        if (data.error) { alert('Gagal hantar: ' + data.error); return; }
        document.getElementById('replyText').value = '';
        document.getElementById('replyText').style.height = 'auto';
        loadMessages(activeChatId, true);
        fetchConversations();
      })
      .catch(err => alert('Gagal hantar: ' + err));
  }

  // Enter = hantar, Shift+Enter = baris baru (macam WhatsApp Web)
  const replyEl = document.getElementById('replyText');
  replyEl.addEventListener('keydown', function (e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendReply();
    }
  });
  replyEl.addEventListener('input', function () {
    this.style.height = 'auto';
    this.style.height = Math.min(this.scrollHeight, 120) + 'px';
  });

  // ======================
  // INIT
  // ======================
  init();
</script>

</body>
