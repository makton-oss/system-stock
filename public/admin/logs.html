<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<title>Inbox — Meta</title>
<style>
  * { box-sizing: border-box; }
  body { font-family: sans-serif; margin:0; height:100vh; display:flex; flex-direction:column; }
  .tokenbar { padding:10px 16px; background:#075e54; display:flex; gap:8px; align-items:center; }
  .tokenbar input { padding:6px 10px; border-radius:6px; border:none; font-size:13px; }
  .tokenbar button { padding:6px 14px; border-radius:6px; border:none; background:#fff; color:#075e54; font-weight:700; cursor:pointer; }
  .main { flex:1; display:flex; overflow:hidden; }

  .sidebar { width:300px; border-right:1px solid #ddd; overflow-y:auto; background:#fff; flex-shrink:0; }
  .convo { padding:12px 14px; border-bottom:1px solid #f0f0f0; cursor:pointer; }
  .convo:hover { background:#f5f5f5; }
  .convo.active { background:#e7f5ef; }
  .convo__name { font-weight:700; font-size:14px; }
  .convo__preview { font-size:12px; color:#888; margin-top:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .convo__time { font-size:11px; color:#aaa; float:right; }
  .sidebar__empty { padding:20px; text-align:center; color:#999; font-size:13px; }

  .chatpane { flex:1; display:flex; flex-direction:column; background:#ece5dd; position:relative; }
  .chatpane__header { padding:12px 16px; background:#f0f0f0; border-bottom:1px solid #ddd; font-weight:700; }
  .chatpane__empty { flex:1; display:flex; align-items:center; justify-content:center; color:#999; }
  .chatpane__messages { flex:1; overflow-y:auto; padding:16px; display:flex; flex-direction:column; gap:8px; }

  .msg { padding:8px 12px; border-radius:8px; max-width:65%; font-size:14px; word-break:break-word; }
  .msg.in { background:#fff; align-self:flex-start; border-radius:0 8px 8px 8px; }
  .msg.out { background:#d9fdd3; align-self:flex-end; border-radius:8px 0 8px 8px; }
  .msg.manual { border:1px dashed #1D9E75; }
  .msg__time { font-size:10px; color:#888; margin-top:4px; }

  .composer { display:flex; gap:8px; padding:12px 16px; background:#f0f0f0; border-top:1px solid #ddd; }
  .composer textarea { flex:1; resize:none; height:42px; padding:8px; border-radius:6px; border:1px solid #ccc; font-family:inherit; }
  .composer button { padding:0 18px; border-radius:6px; border:none; background:#1D9E75; color:#fff; cursor:pointer; }

  .scroll-latest-btn {
    position: fixed;
    left: 50%;
    transform: translateX(-50%);
    bottom: 80px;
    background: #1D9E75;
    color: #fff;
    border: none;
    border-radius: 20px;
    padding: 8px 16px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    box-shadow: 0 2px 8px rgba(0,0,0,0.25);
    display: none;
    z-index: 10;
  }
  .scroll-latest-btn:hover { background: #168a64; }
</style>
</head>
<body>

<div class="tokenbar">
  <input id="token" type="password" placeholder="Admin token">
  <button onclick="loadConversations()">Connect</button>
  <a href="/admin/import.html" class="button">Import</a>
</div>

<div class="main">
  <div class="sidebar" id="sidebar">
    <div class="sidebar__empty">Masukkan token & klik Connect</div>
  </div>

  <div class="chatpane">
    <div id="chatHeader" class="chatpane__header" style="display:none"></div>
    <div id="chatEmpty" class="chatpane__empty">Pilih perbualan di sebelah kiri</div>
    <div id="chatMessages" class="chatpane__messages" style="display:none"></div>
    <button id="scrollLatestBtn" class="scroll-latest-btn" allign="center" onclick="scrollToLatest()">⬇ Mesej terbaru</button>
    <div id="composer" class="composer" style="display:none">
      <textarea id="replyText" placeholder="Taip mesej..."></textarea>
      <button onclick="sendReply()">Send</button>
    </div>
  </div>
</div>

<script>
let activeChatId = null;
let lastConversations = [];
let pollTimer = null;

function getToken() { return document.getElementById('token').value; }

function isNearBottom(box, threshold = 80) {
  return box.scrollHeight - box.scrollTop - box.clientHeight < threshold;
}

function scrollToLatest() {
  const box = document.getElementById('chatMessages');
  box.scrollTop = box.scrollHeight;
  document.getElementById('scrollLatestBtn').style.display = 'none';
}

document.getElementById('chatMessages').addEventListener('scroll', function() {
  document.getElementById('scrollLatestBtn').style.display = isNearBottom(this) ? 'none' : 'block';
});

function loadConversations() {
  if (!getToken()) { alert('Masukkan token dulu'); return; }
  fetchConversations();

  if (pollTimer) clearInterval(pollTimer);
  pollTimer = setInterval(() => {
    fetchConversations();
    if (activeChatId) loadMessages(activeChatId);
  }, 15000);
}

function fetchConversations() {
  fetch(`/admin/conversations?token=${encodeURIComponent(getToken())}&channel=meta`)
    .then(r => r.json())
    .then(data => { lastConversations = data; renderSidebar(); })
    .catch(err => console.log('Gagal load conversations:', err));
}

function renderSidebar() {
  const sidebar = document.getElementById('sidebar');

  if (!lastConversations.length) {
    sidebar.innerHTML = '<div class="sidebar__empty">Tiada perbualan dijumpai</div>';
    return;
  }

  sidebar.innerHTML = '';
  lastConversations.forEach(c => {
    const div = document.createElement('div');
    div.className = 'convo' + (c.chat_id === activeChatId ? ' active' : '');
    const time = new Date(c.last_at).toLocaleString('ms-MY', { hour: '2-digit', minute: '2-digit' });
    const name = c.nickname || c.chat_id;

    const timeEl = document.createElement('span');
    timeEl.className = 'convo__time';
    timeEl.textContent = time;

    const nameEl = document.createElement('div');
    nameEl.className = 'convo__name';
    nameEl.textContent = name;

    const previewEl = document.createElement('div');
    previewEl.className = 'convo__preview';
    previewEl.textContent = (c.last_direction === 'out' ? 'Anda: ' : '') + (c.last_message || '');

    div.appendChild(timeEl);
    div.appendChild(nameEl);
    div.appendChild(previewEl);
    div.onclick = () => openChat(c.chat_id, name);
    sidebar.appendChild(div);
  });
}

function openChat(chatId, name) {
  activeChatId = chatId;

  document.getElementById('chatHeader').style.display = 'block';
  document.getElementById('chatHeader').textContent = name;
  document.getElementById('chatEmpty').style.display = 'none';
  document.getElementById('chatMessages').style.display = 'flex';
  document.getElementById('composer').style.display = 'flex';
  document.getElementById('scrollLatestBtn').style.display = 'none';

  renderSidebar();
  loadUserInfo(chatId);
  loadMessages(chatId, true);
}

function loadUserInfo(chatId) {
  fetch(`/admin/user-info?token=${encodeURIComponent(getToken())}&chat_id=${encodeURIComponent(chatId)}`)
    .then(r => r.json())
    .then(info => {
      if (!info) return;
      const parts = [info.nickname || chatId];
      if (info.role) parts.push(info.role.toUpperCase());
      if (info.outlet_name) parts.push(info.outlet_name);
      if (info.tenant_slug) parts.push(info.tenant_slug);
      document.getElementById('chatHeader').textContent = parts.join(' - ');
    })
    .catch(() => {});
}

function loadMessages(chatId, forceBottom = false) {
  fetch(`/admin/logs?token=${encodeURIComponent(getToken())}&channel=meta&chat_id=${encodeURIComponent(chatId)}`)
    .then(r => r.json())
    .then(data => renderMessages(data, forceBottom));
}

function renderMessages(data, forceBottom = false) {
  const box = document.getElementById('chatMessages');
  const wasNearBottom = forceBottom || isNearBottom(box);
  const prevScrollTop = box.scrollTop;

  box.innerHTML = '';

  [...data].reverse().forEach(row => {
    const div = document.createElement('div');
    div.className = 'msg ' + row.direction + (row.msg_type === 'manual' ? ' manual' : '');

    const text = document.createElement('div');
    text.style.whiteSpace = 'pre-wrap';
    text.textContent = row.message || '(kosong)';
    div.appendChild(text);

    const time = document.createElement('div');
    time.className = 'msg__time';
    time.textContent = new Date(row.created_at).toLocaleString('ms-MY');
    div.appendChild(time);

    box.appendChild(div);
  });

  if (wasNearBottom) {
    box.scrollTop = box.scrollHeight;
    document.getElementById('scrollLatestBtn').style.display = 'none';
  } else {
    box.scrollTop = prevScrollTop;
    document.getElementById('scrollLatestBtn').style.display = 'block';
  }
}

function sendReply() {
  const text = document.getElementById('replyText').value.trim();

  if (!activeChatId) { alert('Pilih perbualan dulu'); return; }
  if (!text) return;

  fetch(`/admin/send?token=${encodeURIComponent(getToken())}`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ chat_id: activeChatId, message: text })
  })
    .then(r => r.json())
    .then(data => {
      if (data.error) { alert('Gagal hantar: ' + data.error); return; }
      document.getElementById('replyText').value = '';
      loadMessages(activeChatId, true);
      fetchConversations();
    })
    .catch(err => alert('Gagal hantar: ' + err));
}
</script>

</body>
</html>
